<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#f97316" opacity="0.1"/>
  <circle cx="1100" cy="530" r="250" fill="#3b82f6" opacity="0.1"/>
  
  <!-- Logo/Brand -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    SydeInnovation
  </text>
  
  <!-- Tagline -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="36" fill="#9ca3af" text-anchor="middle">
    CAD Design &amp; Mechanical Engineering
  </text>
  
  <!-- Accent line -->
  <rect x="400" y="380" width="400" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Stats -->
  <text x="300" y="480" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">$30K+</text>
  <text x="300" y="520" font-family="Arial, sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Earnings</text>
  
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">80+</text>
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Projects</text>
  
  <text x="900" y="480" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">100%</text>
  <text x="900" y="520" font-family="Arial, sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Success Rate</text>
</svg>
