<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SydeFlow Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .status-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1rem;
            padding: 3rem;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            margin-bottom: 2rem;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 0.5rem;
            text-decoration: none;
            color: #e2e8f0;
            transition: all 0.2s;
        }
        .link:hover {
            background: rgba(249, 115, 22, 0.1);
            border-color: rgba(249, 115, 22, 0.3);
            transform: translateX(4px);
        }
        .link-name {
            font-weight: 500;
        }
        .link-url {
            font-family: monospace;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .arrow {
            color: #f97316;
            font-size: 1.25rem;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div class="logo">SydeFlow</div>
            <div class="subtitle">Design Automation Server • Powered by APS</div>
            
            <div class="status">
                <span class="status-dot"></span>
                <span>Server Active</span>
            </div>
            
            <div class="links">
                <a href="/admin" class="link">
                    <div>
                        <div class="link-name">Admin Console</div>
                        <div class="link-url">/admin</div>
                    </div>
                    <span class="arrow">→</span>
                </a>
                <a href="/api" class="link">
                    <div>
                        <div class="link-name">API Endpoint</div>
                        <div class="link-url">/api</div>
                    </div>
                    <span class="arrow">→</span>
                </a>
            </div>
            
            <div class="footer">
                Port 8080 • SydeIngenis
            </div>
        </div>
    </div>
</body>
</html>
